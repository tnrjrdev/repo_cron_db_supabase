name: Supabase keep-alive (Professorlandia Edu)

on:
  schedule:
    - cron: "0 12 * * 2,5"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST (write)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_PROFESSORLANDIA_EDU_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_PROFESSORLANDIA_EDU_ANON_KEY }}

        run: |
          set -e

          SUPABASE_URL="${SUPABASE_URL%/}"
          echo "Pinging ${SUPABASE_URL}"

          code=$(curl -sS -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "apikey: ${SUPABASE_ANON_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
          -H "Content-Type: application/json" \
          -d "{}" \
          "${SUPABASE_URL}/rest/v1/keep_alive")

          echo "HTTP status: $code"

          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "Keep-alive failed"
            exit 1
          fi
