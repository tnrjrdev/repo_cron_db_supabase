name: Supabase keep-alive

on:
  schedule:
    # 2x por semana (bem antes de 7 dias). Ajuste se quiser.
    - cron: "0 12 * * 2,5"   # Terça e Sexta 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -sS -o /dev/null -w "%{http_code}\n" \
            -H "apikey: ${{ secrets.SUPABASE_LONGEVIDA_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_LONGEVIDA_ANON_KEY }}" \
            "${{ secrets.SUPABASE_LONGEVIDA_URL }}/rest/v1/keep_alive?select=id&limit=1"
