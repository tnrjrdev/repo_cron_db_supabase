name: Supabase keep-alive (Chama Atende 2026)

on:
  schedule:
    - cron: "0 12 * * *"   # TODOS OS DIAS 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (write)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_CHAMA_ATENDE2026_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_CHAMA_ATENDE2026_ANON_KEY }}
        run: |
          set -e
          SUPABASE_URL="${SUPABASE_URL%/}"

          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${SUPABASE_URL}/rest/v1/keep_alive")

          echo "HTTP status: $code"

          if [ "$code" != "201" ] && [ "$code" != "200" ]; then
            echo "Keep-alive failed (expected 200 or 201)."
            exit 1
          fi
